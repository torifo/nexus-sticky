<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>最近の付箋</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', 'Hiragino Sans', sans-serif;
      background: #f0f0f0;
      border: 1px solid #bbb;
      border-radius: 10px;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
      user-select: none;
    }

    /* タイトルバー */
    .titlebar {
      background: #4a4a4a;
      color: white;
      padding: 8px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: grab;
      -webkit-app-region: drag;
      flex-shrink: 0;
      border-radius: 9px 9px 0 0;
    }
    .titlebar-title {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }
    .titlebar-close {
      cursor: pointer;
      background: none;
      border: none;
      color: rgba(255,255,255,0.8);
      font-size: 14px;
      line-height: 1;
      padding: 3px 7px;
      border-radius: 4px;
      -webkit-app-region: no-drag;
      transition: background 0.15s;
    }
    .titlebar-close:hover {
      background: rgba(255,255,255,0.25);
      color: white;
    }

    /* リスト */
    .list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .list::-webkit-scrollbar { width: 5px; }
    .list::-webkit-scrollbar-track { background: transparent; }
    .list::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }

    /* 空の状態 */
    .empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #aaa;
      font-size: 13px;
      gap: 8px;
    }
    .empty-icon { font-size: 32px; opacity: 0.4; }

    /* 各アイテム */
    .item {
      background: white;
      border: 1px solid #e0e0e0;
      border-radius: 7px;
      padding: 9px 11px;
      cursor: pointer;
      display: flex;
      align-items: flex-start;
      gap: 10px;
      transition: background 0.12s, box-shadow 0.12s;
    }
    .item:hover {
      background: #fafafa;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }
    .item:active { background: #f0f0f0; }

    /* 色ドット */
    .color-dot {
      width: 13px;
      height: 13px;
      border-radius: 50%;
      margin-top: 2px;
      flex-shrink: 0;
      border: 1px solid rgba(0,0,0,0.12);
    }

    /* テキスト部分 */
    .item-body { flex: 1; min-width: 0; }
    .item-preview {
      font-size: 12.5px;
      color: #333;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.4;
    }
    .item-preview.no-content {
      color: #bbb;
      font-style: italic;
    }
    .item-time {
      font-size: 10.5px;
      color: #aaa;
      margin-top: 3px;
    }
  </style>
</head>
<body>

<div class="titlebar">
  <span class="titlebar-title">📋 最近の付箋</span>
  <button class="titlebar-close" id="btn-close">✕</button>
</div>

<div class="list" id="list">
  <div class="empty">
    <div class="empty-icon">📝</div>
    <div>読み込み中...</div>
  </div>
</div>

<script>
const { invoke } = window.__TAURI__.core;
const { getCurrentWindow } = window.__TAURI__.window;

function timeAgo(ts) {
  const diff = Math.floor(Date.now() / 1000) - Number(ts);
  if (diff < 10)    return 'たった今';
  if (diff < 60)    return `${diff}秒前`;
  if (diff < 3600)  return `${Math.floor(diff / 60)}分前`;
  if (diff < 86400) return `${Math.floor(diff / 3600)}時間前`;
  return `${Math.floor(diff / 86400)}日前`;
}

function escape(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

async function loadHistory() {
  const listEl = document.getElementById('list');
  let records;
  try {
    records = await invoke('get_recently_closed');
  } catch (e) {
    listEl.innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><div>${escape(String(e))}</div></div>`;
    return;
  }

  if (!records || records.length === 0) {
    listEl.innerHTML = `
      <div class="empty">
        <div class="empty-icon">📝</div>
        <div>最近閉じた付箋はありません</div>
      </div>`;
    return;
  }

  listEl.innerHTML = '';
  records.forEach((rec, i) => {
    const preview = rec.preview || rec.data.content.substring(0, 40);
    const hasContent = preview.trim().length > 0;
    const displayText = hasContent
      ? escape(preview.replace(/\n/g, ' '))
      : '（空の付箋）';

    const item = document.createElement('div');
    item.className = 'item';
    item.innerHTML = `
      <div class="color-dot" style="background:${escape(rec.data.color)}"></div>
      <div class="item-body">
        <div class="item-preview${hasContent ? '' : ' no-content'}">${displayText}</div>
        <div class="item-time">${timeAgo(rec.closed_at)}</div>
      </div>`;

    item.addEventListener('click', async () => {
      try {
        await invoke('restore_by_index', { index: i });
        await loadHistory();
      } catch (e) {
        console.error('restore failed:', e);
      }
    });

    listEl.appendChild(item);
  });
}

document.getElementById('btn-close').addEventListener('click', async () => {
  await getCurrentWindow().close();
});

loadHistory();

// 10秒ごとに「○分前」表示を更新
setInterval(loadHistory, 10000);
</script>
</body>
</html>
